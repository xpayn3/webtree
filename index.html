<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebGPU · Windy Tree</title>
  <link rel="stylesheet" href="style.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.webgpu.js",
        "three/webgpu": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.webgpu.js",
        "three/tsl": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.tsl.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div id="splash">
    <div class="splash-mark" aria-hidden="true">
      <svg class="splash-ring" viewBox="0 0 40 40">
        <circle class="ring-track" cx="20" cy="20" r="17" />
        <circle class="ring-arc"   cx="20" cy="20" r="17" />
      </svg>
      <span class="splash-dot"></span>
    </div>
    <div class="splash-title">WINDY TREE</div>
    <div class="splash-meta">Initialising&nbsp;WebGPU</div>
    <div class="splash-progress" aria-hidden="true"></div>
  </div>
<div id="layout">
    <div id="canvas-wrap">
      <div id="mode-bar">
        <button type="button" class="mode-tab on" data-mode="edit">Edit</button>
        <button type="button" class="mode-tab" data-mode="sculpt">Sculpt</button>
      </div>
      <div id="stats"></div>
      <div id="tree-info"></div>
      <div id="axis-gizmo" aria-hidden="true"></div>
      <div id="canvas-tips"></div>
      <div id="grab-halo" hidden></div>
      <div id="brush-cursor" hidden></div>
      <aside id="sculpt-toolbar"></aside>
      <div id="tree-labels"></div>
      <button id="help-btn" type="button" title="Help & controls (?)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
          <path d="M12 17h.01"/>
        </svg>
      </button>
      <div id="spotlight" hidden>
        <div class="sp-panel" role="dialog" aria-label="Command search">
          <input class="sp-input" type="text" placeholder="Search commands, sliders, species…" autocomplete="off" spellcheck="false" />
          <div class="sp-results"></div>
          <div class="sp-hint">
            <span>↑↓ navigate</span>
            <span>⏎ run / focus slider</span>
            <span>esc close</span>
          </div>
        </div>
      </div>
      <aside id="toolbar">
        <button class="toolbar-btn" id="tb-theme" title="Toggle light / dark"></button>
        <button class="toolbar-btn" id="tb-wire" title="Toggle wireframe">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/>
            <path d="m3.3 7 8.7 5 8.7-5"/>
            <path d="M12 22V12"/>
          </svg>
        </button>
        <button class="toolbar-btn" id="tb-spline" title="Show tree as spline">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="19" cy="5" r="2"/>
            <circle cx="5" cy="19" r="2"/>
            <path d="M5 17A12 12 0 0 1 17 5"/>
          </svg>
        </button>
        <button class="toolbar-btn active" id="tb-leaves" title="Toggle leaves">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10z"/>
            <path d="M2 21c0-3 1.85-5.36 5.08-6"/>
          </svg>
        </button>
        <button class="toolbar-btn" id="tb-person" title="Scale reference (1.8 m human)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="4" r="2"/>
            <path d="M10 6 h4 v6 h-4 z M10 12 l-1 9 M14 12 l1 9"/>
          </svg>
        </button>
        <button class="toolbar-btn active" id="tb-physics" title="Enable branch-grab (right-drag)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 11V6a2 2 0 0 0-2-2a2 2 0 0 0-2 2"/>
            <path d="M14 10V4a2 2 0 0 0-2-2a2 2 0 0 0-2 2v2"/>
            <path d="M10 10.5V6a2 2 0 0 0-2-2a2 2 0 0 0-2 2v8"/>
            <path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/>
          </svg>
        </button>
        <button class="toolbar-btn" id="tb-edit" title="Sculpt mode — reshape branches manually">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 14.66V20a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h5.34"/>
            <polygon points="18 2 22 6 12 16 8 16 8 12 18 2"/>
          </svg>
        </button>
        <button class="toolbar-btn" id="tb-upload" title="Upload leaf texture">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
        </button>
        <button class="toolbar-btn" id="tb-export" title="Copy preset JSON">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="14" height="14" x="8" y="8" rx="2" ry="2"/>
            <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>
          </svg>
        </button>
        <button class="toolbar-btn" id="tb-screenshot" title="Save PNG screenshot">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/>
            <circle cx="12" cy="13" r="3"/>
          </svg>
        </button>
        <button class="toolbar-btn" id="tb-gltf" title="Export mesh (OBJ)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16.5 9.4 7.55 4.24"/>
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
            <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
            <line x1="12" y1="22.08" x2="12" y2="12"/>
          </svg>
        </button>
        <button class="toolbar-btn" id="tb-lod" title="LOD editor">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="12 2 2 7 12 12 22 7 12 2"/>
            <polyline points="2 17 12 22 22 17"/>
            <polyline points="2 12 12 17 22 12"/>
          </svg>
        </button>
        <div class="toolbar-sep"></div>
        <button class="toolbar-btn primary" id="tb-regen" title="Regenerate tree">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
            <path d="M21 3v5h-5"/>
            <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
            <path d="M3 21v-5h5"/>
          </svg>
        </button>
        <input type="file" id="tb-upload-input" accept="image/png,image/jpeg,image/webp" style="display:none">
      </aside>
    </div>
    <aside id="sidebar">
      <div id="sidebar-resize"></div>
      <header>
        <h2>Controls</h2>
      </header>
      <div id="sidebar-body"></div>
    </aside>
  </div>
  <div id="fallback" hidden>
    <h1>WebGPU not available</h1>
    <p>This demo needs a browser with WebGPU enabled (Chrome, Edge, or Safari 18+).</p>
  </div>
  <script type="module" src="main.js?v=r11"></script>
</body>
</html>
